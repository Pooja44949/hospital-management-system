<!DOCTYPE html>
<html>
<head>
<title>Hospital</title>
<style>
body { font-family: Arial; background:#eef; }
h2 { text-align:center; }
table { width:100%; border-collapse:collapse; }
th,td { padding:10px; border:1px solid black; text-align:center; }
th { background:#0077b6; color:white; }
a { text-decoration:none; }
</style>
</head>

<body>

<h2>🏥 Hospital Management System</h2>

<a href="/add">➕ Add Patient</a>

<table>
<tr>
<th>ID</th><th>Name</th><th>Age</th><th>Gender</th>
<th>Doctor</th><th>Appointment</th><th>Diagnosis</th><th>Action</th>
</tr>

{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
<td>{{row[5]}}</td>
<td>{{row[6]}}</td>
<td>
<a href="/delete/{{row[0]}}">Delete</a> |
<a href="/edit/{{row[0]}}">Edit</a>
</td>
</tr>
{% endfor %}
</table>

</body>
</html>
